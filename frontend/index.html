<!-- =========================
index.html
========================= -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Product Mapping Tool</title>

    <!-- =========================
    AG GRID CSS
    ========================= -->

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css"
    />

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css"
    />

    <!-- =========================
    AG GRID JS
    ========================= -->

    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>

    <!-- =========================
    STYLE
    ========================= -->

    <style>

        * {

            box-sizing: border-box;

        }

        body {

            margin: 0;

            padding: 20px;

            font-family: Arial, sans-serif;

            background: #f3f4f6;

        }

        h1 {

            margin-bottom: 24px;

        }

        h2 {

            margin-top: 0;

        }

        .section {

            background: white;

            border-radius: 10px;

            padding: 20px;

            margin-bottom: 20px;

            box-shadow: 0 2px 8px rgba(0,0,0,0.08);

        }

        .row {

            display: flex;

            gap: 12px;

            align-items: center;

            margin-bottom: 12px;

            flex-wrap: wrap;

        }

        input[type="file"] {

            padding: 8px;

        }

        select,
        input[type="number"] {

            padding: 8px;

            border-radius: 6px;

            border: 1px solid #ccc;

            min-width: 220px;

        }

        button {

            border: none;

            padding: 10px 16px;

            border-radius: 6px;

            cursor: pointer;

            font-weight: bold;

        }

        button:hover {

            opacity: 0.9;

        }

        .primary {

            background: #2563eb;

            color: white;

        }

        .success {

            background: #16a34a;

            color: white;

        }

        .danger {

            background: #dc2626;

            color: white;

        }

        .secondary {

            background: #6b7280;

            color: white;

        }

        .checkbox-grid {

            display: grid;

            grid-template-columns: repeat(
                auto-fill,
                minmax(250px, 1fr)
            );

            gap: 10px;

            margin-top: 12px;

        }

        .checkbox-item {

            background: #f9fafb;

            padding: 8px 10px;

            border-radius: 6px;

            border: 1px solid #e5e7eb;

        }

        .mapping-row {

            padding: 12px;

            border: 1px solid #e5e7eb;

            border-radius: 8px;

            background: #fafafa;

        }

        .weight-warning {

            color: red;

            font-weight: bold;

            margin-top: 8px;

        }

        #statusText {

            margin-top: 12px;

            font-weight: bold;

        }

        #mappingGrid {

            width: 100%;

            height: 700px;

        }

        .info-box {

            background: #eff6ff;

            border: 1px solid #bfdbfe;

            padding: 12px;

            border-radius: 8px;

            margin-top: 12px;

        }

    </style>

</head>

<body>

    <!-- =========================
    TITLE
    ========================= -->

    <h1>Product Mapping Tool</h1>

    <!-- =========================
    FILE UPLOAD
    ========================= -->

    <div class="section">

        <h2>1. Upload Files</h2>

        <div class="row">

            <div>

                <label>
                    <strong>Source File (df_a)</strong>
                </label>

                <br /><br />

                <input
                    type="file"
                    id="fileA"
                    accept=".xlsx,.xls,.csv"
                />

            </div>

            <div>

                <label>
                    <strong>Target File (df_b)</strong>
                </label>

                <br /><br />

                <input
                    type="file"
                    id="fileB"
                    accept=".xlsx,.xls,.csv"
                />

            </div>

        </div>

        <div class="info-box">

            Supported formats:
            .xlsx, .xls, .csv

        </div>

    </div>

    <!-- =========================
    COLUMN MAPPING
    ========================= -->

    <div class="section">

        <h2>2. Mapping Columns</h2>

        <div id="mappingContainer"></div>

        <br />

        <button
            id="addMapping"
            class="primary"
        >

            Add Mapping Pair

        </button>

        <br /><br />

        <div>

            <strong>Total Weight:</strong>

            <span id="weightTotal">

                0

            </span>

        </div>

        <div
            id="weightWarning"
            class="weight-warning"
        ></div>

        <br />

        <div class="row">

            <div>

                <label>
                    <strong>Threshold</strong>
                </label>

                <br /><br />

                <input
                    type="number"
                    id="threshold"
                    value="90"
                    min="0"
                    max="100"
                    step="1"
                />

            </div>

        </div>

    </div>

    <!-- =========================
    EXPORT COLUMNS
    ========================= -->

    <div class="section">

        <h2>3. Export / Preview Columns</h2>

        <h3>Source Columns (df_a)</h3>

        <div
            id="sourceColumns"
            class="checkbox-grid"
        ></div>

        <br />

        <h3>Target Columns (df_b)</h3>

        <div
            id="targetColumns"
            class="checkbox-grid"
        ></div>

    </div>

    <!-- =========================
    ACTION BUTTONS
    ========================= -->

    <div class="section">

        <h2>4. Actions</h2>

        <div class="row">

            <button
                id="runMapping"
                class="success"
            >

                Run Mapping

            </button>

            <button
                id="exportExcel"
                class="secondary"
            >

                Export XLSX

            </button>

        </div>

        <div id="statusText"></div>

    </div>

    <!-- =========================
    PREVIEW GRID
    ========================= -->

    <div class="section">

        <h2>5. Mapping Preview</h2>

        <div
            id="mappingGrid"
            class="ag-theme-alpine"
        ></div>

    </div>

    <!-- =========================
    JS
    ========================= -->

    <script src="./app.js"></script>

</body>

</html>
