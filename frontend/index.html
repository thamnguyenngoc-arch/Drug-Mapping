<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Product Mapping Tool</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/static/style.css" />

  <!-- AG GRID -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css"
  />

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css"
  />

</head>

<body>

  <!-- ===================================== -->
  <!-- SIDEBAR -->
  <!-- ===================================== -->

  <aside class="sidebar">

    <h1>Mapping Tool</h1>

    <!-- ============================= -->
    <!-- Upload -->
    <!-- ============================= -->

    <div class="card">

      <h2>Upload Files</h2>

      <label>DF_A File</label>

      <input
        type="file"
        id="fileA"
        accept=".xlsx,.xls,.csv"
      />

      <label>DF_B File</label>

      <input
        type="file"
        id="fileB"
        accept=".xlsx,.xls,.csv"
      />

    </div>

    <!-- ============================= -->
    <!-- Mapping Config -->
    <!-- ============================= -->

    <div class="card">

      <h2>Column Mapping</h2>
      <div class="export-section">

        <h3>DF_A Columns</h3>

        <div id="sourceExportColumns"></div>

        <h3>DF_B Columns</h3>

        <div id="targetExportColumns"></div>

      </div>

      <div id="mappingContainer">

        <!-- ROW 1 -->

        <div class="mapping-row">

          <select class="source-column">

            <option value="Market Name cleaned">
              Market Name cleaned
            </option>

            <option value="Unit (Source)">
              Unit (Source)
            </option>

            <option value="Packaging">
              Packaging
            </option>

          </select>

          <span>→</span>

          <select class="target-column">

            <option value="product_name">
              product_name
            </option>

            <option value="unit">
              unit
            </option>

            <option value="volumes">
              volumes
            </option>

          </select>

          <input
            type="number"
            class="weight-input"
            value="0.5"
            step="0.1"
            min="0"
            max="1"
          />

        </div>

        <!-- ROW 2 -->

        <div class="mapping-row">

          <select class="source-column">

            <option value="Unit (Source)">
              Unit (Source)
            </option>

          </select>

          <span>→</span>

          <select class="target-column">

            <option value="unit">
              unit
            </option>

          </select>

          <input
            type="number"
            class="weight-input"
            value="0.3"
            step="0.1"
            min="0"
            max="1"
          />

        </div>

        <!-- ROW 3 -->

        <div class="mapping-row">

          <select class="source-column">

            <option value="Packaging">
              Packaging
            </option>

          </select>

          <span>→</span>

          <select class="target-column">

            <option value="volumes">
              volumes
            </option>

          </select>

          <input
            type="number"
            class="weight-input"
            value="0.2"
            step="0.1"
            min="0"
            max="1"
          />

        </div>

      </div>

      <button id="addMappingBtn">
        + Add Mapping
      </button>

      <div class="weight-summary">

        Total Weight:
        <span id="weightTotal">1.0</span>

      </div>

    </div>

    <!-- ============================= -->
    <!-- Threshold -->
    <!-- ============================= -->

    <div class="card">

      <h2>Threshold</h2>

      <label>Auto Match Threshold</label>

      <input
        type="range"
        min="0"
        max="100"
        value="95"
        id="thresholdSlider"
      />

      <div class="slider-value">

        <span id="thresholdValue">95</span>

      </div>

    </div>

    <!-- ============================= -->
    <!-- Export Columns -->
    <!-- ============================= -->

    <div class="card">

      <h2>Export Columns</h2>

      <div class="checkbox-group">

        <label>
          <input
            type="checkbox"
            checked
          />
          Source Name
        </label>

        <label>
          <input
            type="checkbox"
            checked
          />
          Matched Name
        </label>

        <label>
          <input
            type="checkbox"
            checked
          />
          Score
        </label>

        <label>
          <input
            type="checkbox"
            checked
          />
          Unit
        </label>

        <label>
          <input
            type="checkbox"
            checked
          />
          Status
        </label>

      </div>

    </div>

    <!-- ============================= -->
    <!-- Buttons -->
    <!-- ============================= -->

    <div class="action-buttons">

      <button class="primary-btn">
        Run Mapping
      </button>

      <button class="secondary-btn">
        Export Excel
      </button>

    </div>

  </aside>

  <!-- ===================================== -->
  <!-- MAIN CONTENT -->
  <!-- ===================================== -->

  <main class="main-content">

    <!-- ============================= -->
    <!-- TOPBAR -->
    <!-- ============================= -->

    <div class="topbar">

      <div class="search-box">

        <input
          type="text"
          placeholder="Search product..."
        />

      </div>

      <div class="filter-group">

        <select>

          <option>All Scores</option>
          <option>>=95</option>
          <option>80-94</option>
          <option><80</option>

        </select>

        <select>

          <option>All Status</option>
          <option>Matched</option>
          <option>Review</option>
          <option>Unmatched</option>

        </select>

      </div>

    </div>

    <!-- ============================= -->
    <!-- SUMMARY -->
    <!-- ============================= -->

    <div class="summary-grid">

      <div class="summary-card">

        <h3>Total Rows</h3>

        <p id="totalRows">0</p>

      </div>

      <div class="summary-card">

        <h3>Matched</h3>

        <p id="matchedRows">0</p>

      </div>

      <div class="summary-card">

        <h3>Review</h3>

        <p id="reviewRows">0</p>

      </div>

      <div class="summary-card">

        <h3>Unmatched</h3>

        <p id="unmatchedRows">0</p>

      </div>

    </div>

    <!-- ============================= -->
    <!-- TABLE -->
    <!-- ============================= -->

    <div class="table-section">

      <div class="table-header">

        <h2>Mapping Preview</h2>

      </div>

      <div
        id="myGrid"
        class="ag-theme-alpine"
        style="height: 650px;"
      ></div>

    </div>

  </main>

  <!-- AG GRID -->
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>

  <!-- APP -->
  <script src="/static/app.js"></script>

</body>

</html>
