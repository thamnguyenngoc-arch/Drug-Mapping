<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Product Mapping Tool
  </title>

  <!-- AG GRID -->

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css"
  />

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css"
  />

  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>

  <!-- STYLE -->

  <style>

    body {

      font-family: Arial, sans-serif;

      margin: 20px;

      background: #f5f7fa;

    }

    h1 {

      margin-bottom: 20px;

    }

    h3 {

      margin-top: 30px;

      margin-bottom: 10px;

    }

    .section {

      background: white;

      padding: 20px;

      border-radius: 10px;

      margin-bottom: 20px;

      box-shadow:
        0 2px 6px rgba(0,0,0,0.08);

    }

    .upload-group {

      display: flex;

      gap: 20px;

      flex-wrap: wrap;

    }

    .upload-box {

      flex: 1;

      min-width: 300px;

    }

    .checkbox-grid {

      display: grid;

      grid-template-columns:
        repeat(auto-fill, minmax(250px, 1fr));

      gap: 8px;

      margin-top: 10px;

    }

    .checkbox-item {

      display: flex;

      align-items: center;

      gap: 8px;

      background: #f8f9fc;

      padding: 6px 10px;

      border-radius: 6px;

    }

    .mapping-row {

      display: flex;

      align-items: center;

      gap: 10px;

      margin-bottom: 10px;

      flex-wrap: wrap;

    }

    select,
    input {

      padding: 8px;

      border-radius: 6px;

      border: 1px solid #ccc;

    }

    .weight-input {

      width: 80px;

    }

    button {

      padding: 10px 16px;

      border: none;

      border-radius: 6px;

      cursor: pointer;

      background: #2563eb;

      color: white;

      font-weight: bold;

    }

    button:hover {

      opacity: 0.9;

    }

    .remove-btn {

      background: #dc2626;

    }

    #runMapping {

      background: #16a34a;

      font-size: 16px;

    }

    #statusText {

      margin-top: 10px;

      font-weight: bold;

    }

    #mappingGrid {

      height: 650px;

      width: 100%;

      margin-top: 20px;

    }

  </style>

</head>

<body>

  <h1>
    Product Mapping Tool
  </h1>

  <!-- ========================= -->
  <!-- FILE UPLOAD -->
  <!-- ========================= -->

  <div class="section">

    <h3>
      Upload Files
    </h3>

    <div class="upload-group">

      <div class="upload-box">

        <label>
          Source File
        </label>

        <br /><br />

        <input
          type="file"
          id="fileA"
          accept=".xlsx,.xls,.csv"
        />

      </div>

      <div class="upload-box">

        <label>
          Target File
        </label>

        <br /><br />

        <input
          type="file"
          id="fileB"
          accept=".xlsx,.xls,.csv"
        />

      </div>

    </div>

  </div>

  <!-- ========================= -->
  <!-- EXPORT COLUMNS -->
  <!-- ========================= -->

  <div class="section">

    <h3>
      Source Export Columns
    </h3>

    <div
      id="sourceColumns"
      class="checkbox-grid"
    ></div>

    <h3>
      Target Export Columns
    </h3>

    <div
      id="targetColumns"
      class="checkbox-grid"
    ></div>

  </div>

  <!-- ========================= -->
  <!-- COLUMN MAPPING -->
  <!-- ========================= -->

  <div class="section">

    <h3>
      Column Mapping
    </h3>

    <div id="mappingContainer"></div>

    <br />

    <button id="addMapping">
      Add Mapping
    </button>

    <p>

      <strong>
        Total Weight:
      </strong>

      <span id="weightTotal">
        0
      </span>

    </p>

  </div>

  <!-- ========================= -->
  <!-- RUN -->
  <!-- ========================= -->

  <div class="section">

    <button id="runMapping">
      Run Mapping
    </button>

    <p id="statusText"></p>

  </div>

  <!-- ========================= -->
  <!-- RESULT GRID -->
  <!-- ========================= -->

  <div class="section">

    <h3>
      Mapping Result
    </h3>

    <div
      id="mappingGrid"
      class="ag-theme-alpine"
    ></div>

  </div>

  <!-- APP JS -->

  <script src="app.js"></script>

</body>

</html>
